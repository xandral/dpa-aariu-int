services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-wpim}
      POSTGRES_USER: ${DB_USER:-wpim}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wpim}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docs/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wpim"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${DB_USER:-wpim}:${DB_PASSWORD:-wpim}@db:5432/${DB_NAME:-wpim}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  celery-worker:
    build: .
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4 -E
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${DB_USER:-wpim}:${DB_PASSWORD:-wpim}@db:5432/${DB_NAME:-wpim}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  celery-beat:
    build: .
    command: celery -A app.celery_app beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${DB_USER:-wpim}:${DB_PASSWORD:-wpim}@db:5432/${DB_NAME:-wpim}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  flower:
    build: .
    command: >
      celery -A app.celery_app flower --port=5555
      --broker_api=http://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:15672/api/
    ports:
      - "5555:5555"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${DB_USER:-wpim}:${DB_PASSWORD:-wpim}@db:5432/${DB_NAME:-wpim}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  pgdata:
